<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadScanner — Карта</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
<style>
  :root {
    --bg:        #141414;
    --bg2:       #1c1c1c;
    --bg3:       #242424;
    --border:    #2e2e2e;
    --border2:   #3a3a3a;
    --text:      #f0f0f0;
    --text2:     #a0a0a0;
    --text3:     #606060;
    --accent:    #3d8ef0;
    --accent-h:  #5aa0f5;
    --success:   #3a9e6a;
    --error:     #c94f4f;
    --warning:   #d4882a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Layout ──────────────────────────────────────── */
  #app {
    display: flex;
    height: 100vh;
  }

  #map-wrap {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  #map {
    flex: 1;
    background: #0d0d0d;
  }

  /* ── Right panel ─────────────────────────────────── */
  #right-panel {
    width: 340px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  /* ── Top bar ─────────────────────────────────────── */
  #topbar {
    height: 44px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0;
  }

  #topbar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    color: var(--text3);
    text-transform: uppercase;
    flex: 1;
  }

  .tb-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 5px;
    color: var(--text2);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--bg3); color: var(--text); }
  .tb-btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tb-btn.accent:hover { background: var(--accent-h); }

  /* ── Stats bar under map ─────────────────────────── */
  #stats-bar {
    height: 32px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 20px;
    flex-shrink: 0;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text3);
  }
  .stat-item b { color: var(--text2); font-weight: 600; }
  .stat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    display: inline-block;
  }
  .stat-dot.live { background: var(--success); box-shadow: 0 0 4px var(--success); }

  /* ── Right panel sections ────────────────────────── */
  .panel-section {
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-head {
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    background: var(--bg3);
  }

  .panel-head-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--text3);
    text-transform: uppercase;
    flex: 1;
  }

  /* ── Video player section ────────────────────────── */
  #video-section { flex-shrink: 0; }

  #video-placeholder {
    height: 180px;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 12px;
  }

  #video-controls {
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
  }

  #video-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
  }
  #video-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .vc-btn {
    background: transparent;
    border: none;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    line-height: 1;
  }
  .vc-btn:hover { background: var(--bg2); color: var(--text); }

  #video-time {
    font-size: 10px;
    color: var(--text3);
    font-family: "Consolas", monospace;
    white-space: nowrap;
  }

  /* ── Sign detail / editor ────────────────────────── */
  #detail-section {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  #detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text3);
    font-size: 12px;
  }

  #detail-empty-icon { font-size: 28px; color: var(--border2); }

  #detail-content {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  #detail-img-row {
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  #detail-img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    background: var(--bg3);
    border-radius: 6px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  #detail-meta { flex: 1; }

  #detail-type {
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  #detail-name {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
    line-height: 1.4;
  }

  #detail-badge {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: var(--accent);
    color: #fff;
  }

  #detail-fields {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .field-lbl {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: var(--text3);
    text-transform: uppercase;
    width: 70px;
    flex-shrink: 0;
  }

  .field-val {
    font-size: 12px;
    color: var(--text2);
    font-family: "Consolas", monospace;
  }

  /* ── Edit form ───────────────────────────────────── */
  #edit-section {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .edit-head {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--text3);
    text-transform: uppercase;
  }

  .edit-row { display: flex; flex-direction: column; gap: 4px; }

  .edit-lbl {
    font-size: 10px;
    color: var(--text3);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .edit-input, .edit-select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    width: 100%;
    font-family: inherit;
    transition: border-color .12s;
  }
  .edit-input:focus, .edit-select:focus { border-color: var(--accent); }

  #edit-actions {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    flex-shrink: 0;
  }

  .action-btn {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s;
  }

  #btn-save { background: var(--accent); color: #fff; }
  #btn-save:hover { background: var(--accent-h); }
  #btn-jump { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); }
  #btn-jump:hover { background: var(--bg); color: var(--text); }
  #btn-delete { background: transparent; border: 1px solid var(--error); color: var(--error); flex: 0; padding: 8px 14px; }
  #btn-delete:hover { background: var(--error); color: #fff; }

  /* ── Leaflet overrides for dark theme ────────────── */
  .leaflet-container { background: #111 !important; }

  .leaflet-tile {
    filter: brightness(0.55) contrast(1.1) saturate(0.7) hue-rotate(180deg) invert(1);
  }

  .leaflet-control-zoom a {
    background: var(--bg2) !important;
    border-color: var(--border) !important;
    color: var(--text2) !important;
  }
  .leaflet-control-zoom a:hover {
    background: var(--bg3) !important;
    color: var(--text) !important;
  }

  .leaflet-control-attribution {
    background: rgba(20,20,20,0.8) !important;
    color: var(--text3) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--text3) !important; }

  /* ── Sign markers ────────────────────────────────── */
  .sign-marker-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sign-marker {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg2);
    border: 2px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
    overflow: hidden;
  }

  .sign-marker:hover, .sign-marker.selected {
    border-color: var(--accent);
    transform: scale(1.2);
    z-index: 9999 !important;
  }

  .sign-marker img { width: 24px; height: 24px; object-fit: contain; }

  /* ── Position marker ─────────────────────────────── */
  .pos-marker {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid rgba(61,142,240,.3);
    box-shadow: 0 0 0 4px rgba(61,142,240,.15);
  }

  /* ── Scrollbar ───────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Filter bar ──────────────────────────────────── */
  #filter-bar {
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 6px;
    height: 40px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #filter-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 5px 8px;
    color: var(--text);
    font-size: 11px;
    outline: none;
  }
  #filter-input:focus { border-color: var(--accent); }
  #filter-input::placeholder { color: var(--text3); }

  .filter-chip {
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text3);
    font-size: 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Toast ───────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 10000;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- ── Map side ────────────────────────────────── -->
  <div id="map-wrap">

    <div id="topbar">
      <span id="topbar-title">GPS-карта знаков</span>
      <button class="tb-btn" onclick="fitTrack()">По треку</button>
      <button class="tb-btn" onclick="toggleTrack()">Трек</button>
      <button class="tb-btn" id="btn-live" onclick="toggleLive()">⬤ Live</button>
      <a class="tb-btn accent" href="/api/geojson_export" download>↓ GeoJSON</a>
    </div>

    <div id="filter-bar">
      <input id="filter-input" type="text" placeholder="Фильтр по типу знака…" oninput="applyFilter()">
      <div class="filter-chip active" data-side="all"  onclick="setChip(this,'all')">Все</div>
      <div class="filter-chip"        data-side="left" onclick="setChip(this,'left')">Лево</div>
      <div class="filter-chip"        data-side="right"onclick="setChip(this,'right')">Право</div>
    </div>

    <div id="map"></div>

    <div id="stats-bar">
      <div class="stat-item">
        <span class="stat-dot" id="live-dot"></span>
        <span id="stat-mode">Статика</span>
      </div>
      <div class="stat-item">Знаков: <b id="stat-signs">0</b></div>
      <div class="stat-item">Трек: <b id="stat-pts">0</b> точек</div>
      <div class="stat-item" id="stat-pos-wrap" style="display:none">
        Позиция: <b id="stat-pos">0с</b>
      </div>
    </div>
  </div>

  <!-- ── Right panel ─────────────────────────────── -->
  <div id="right-panel">

    <!-- Video -->
    <div class="panel-section" id="video-section">
      <div class="panel-head">
        <span class="panel-head-title">Видеоплеер</span>
        <span id="vid-name" style="font-size:10px;color:var(--text3);font-family:monospace;"></span>
      </div>
      <div id="video-placeholder">Выберите знак или нажмите Live</div>
      <div id="video-controls">
        <button class="vc-btn" onclick="vcStep(-10)">«</button>
        <button class="vc-btn" id="vc-play" onclick="vcToggle()">▷</button>
        <button class="vc-btn" onclick="vcStep(10)">»</button>
        <input id="video-slider" type="range" min="0" max="100" value="0"
               oninput="vcSeek(this.value)">
        <span id="video-time">0:00</span>
      </div>
    </div>

    <!-- Detail / Editor -->
    <div id="detail-section">

      <div class="panel-head" style="border-top: 1px solid var(--border);">
        <span class="panel-head-title">Знак</span>
        <button class="tb-btn" id="btn-close-detail" onclick="closeDetail()" style="display:none;">✕</button>
      </div>

      <div id="detail-empty">
        <div id="detail-empty-icon">◈</div>
        <span>Кликните на маркер знака</span>
      </div>

      <div id="detail-content">
        <div id="detail-img-row">
          <img id="detail-img" src="" alt="знак">
          <div id="detail-meta">
            <div id="detail-type">—</div>
            <div id="detail-name">—</div>
            <div id="detail-badge">—</div>
          </div>
        </div>

        <div id="detail-fields">
          <div class="field-row">
            <span class="field-lbl">Время</span>
            <span class="field-val" id="df-time">—</span>
          </div>
          <div class="field-row">
            <span class="field-lbl">Видео</span>
            <span class="field-val" id="df-video">—</span>
          </div>
          <div class="field-row">
            <span class="field-lbl">Азимут</span>
            <span class="field-val" id="df-azimuth">—</span>
          </div>
          <div class="field-row">
            <span class="field-lbl">Сторона</span>
            <span class="field-val" id="df-side">—</span>
          </div>
        </div>

        <div id="edit-section">
          <div class="edit-head">Редактировать</div>
          <div class="edit-row">
            <label class="edit-lbl">Тип знака</label>
            <select class="edit-select" id="edit-type" onchange="onTypeChange()">
              <option value="">Загрузка…</option>
            </select>
          </div>
          <div class="edit-row" id="edit-desc-row" style="display:none;">
            <label class="edit-lbl">Текст на знаке</label>
            <input class="edit-input" id="edit-desc" type="text" placeholder="Введите значение…">
          </div>
        </div>

        <div id="edit-actions">
          <button class="action-btn" id="btn-jump" onclick="jumpToFrame()">⏩ К кадру</button>
          <button class="action-btn" id="btn-save" onclick="saveSign()">✓ Сохранить</button>
          <button class="action-btn" id="btn-delete" onclick="deleteSign()">✕</button>
        </div>
      </div>

    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Constants ───────────────────────────────────────────────────────
const PORT = location.port || 3000;
const API  = `http://localhost:${PORT}/api`;

// ── State ───────────────────────────────────────────────────────────
let map, trackLine, posMarker;
let markers       = {};   // id → L.Marker
let signsData     = [];   // raw array from /api/signs
let signTypes     = [];   // [{type, name}]
let selectedId    = null;
let liveMode      = false;
let showTrack     = true;
let filterText    = "";
let filterSide    = "all";
let vcPlaying     = false;
let vcSeconds     = 0;
let vcInterval    = null;
let typesWithText = new Set();  // заполним из meta

// ── Map init ────────────────────────────────────────────────────────
function initMap() {
  map = L.map("map", { zoomControl: true, attributionControl: true });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap",
    maxZoom: 19,
  }).addTo(map);

  posMarker = L.marker([0, 0], {
    icon: L.divIcon({
      className: "",
      html: '<div class="pos-marker"></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    }),
    zIndexOffset: 1000,
  });
}

// ── Load data ───────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadTrack(), loadSigns(), loadSignTypes()]);
}

async function loadTrack() {
  const r = await fetch(`${API}/track`);
  const pts = await r.json();
  document.getElementById("stat-pts").textContent = pts.length;
  if (!pts.length) return;

  if (trackLine) map.removeLayer(trackLine);
  trackLine = L.polyline(pts, {
    color: "#3d8ef0",
    weight: 2.5,
    opacity: 0.7,
  }).addTo(map);
  map.fitBounds(trackLine.getBounds(), { padding: [30, 30] });
}

async function loadSigns() {
  const r = await fetch(`${API}/signs`);
  signsData = await r.json();
  document.getElementById("stat-signs").textContent = signsData.length;
  renderMarkers();
}

async function loadSignTypes() {
  const r = await fetch(`${API}/sign_types`);
  signTypes = await r.json();

  // Заполнить select
  const sel = document.getElementById("edit-type");
  sel.innerHTML = signTypes.map(t =>
    `<option value="${t.type}">${t.type} — ${t.name}</option>`
  ).join("");
}

// ── Markers ─────────────────────────────────────────────────────────
function renderMarkers() {
  // Убрать старые
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  const txt = filterText.toLowerCase();

  signsData.forEach(sign => {
    // Фильтр по типу
    if (txt && !sign.type.toLowerCase().includes(txt)) return;
    // Фильтр по стороне
    if (filterSide !== "all") {
      const isLeft = String(sign.side).includes("True");
      if (filterSide === "left"  && !isLeft) return;
      if (filterSide === "right" &&  isLeft) return;
    }

    const imgSrc = sign.description
      ? `${API}/img/${sign.type}-${sign.description}`
      : `${API}/img/${sign.type}`;

    const icon = L.divIcon({
      className: "",
      html: `<div class="sign-marker" id="sm-${sign.id}">
               <img src="${imgSrc}" alt="${sign.type}"
                    onerror="this.style.display='none'">
             </div>`,
      iconSize:   [36, 36],
      iconAnchor: [18, 18],
      popupAnchor:[0, -20],
    });

    const m = L.marker([sign.lat, sign.lon], { icon })
      .addTo(map)
      .on("click", () => selectSign(sign.id));

    markers[sign.id] = m;
  });
}

// ── Sign selection ──────────────────────────────────────────────────
async function selectSign(id) {
  // Деселект предыдущего
  if (selectedId) {
    const prev = document.getElementById(`sm-${selectedId}`);
    if (prev) prev.classList.remove("selected");
  }

  selectedId = id;
  const el = document.getElementById(`sm-${id}`);
  if (el) el.classList.add("selected");

  // Загрузить детали
  const r    = await fetch(`${API}/sign/${id}`);
  const feat = await r.json();
  const p    = feat.properties;

  // Показать панель
  document.getElementById("detail-empty").style.display   = "none";
  document.getElementById("detail-content").style.display = "flex";
  document.getElementById("btn-close-detail").style.display = "";

  // Иконка
  const desc   = p.SEM250 || "";
  const imgSrc = desc
    ? `${API}/img/${p.type}-${desc}`
    : `${API}/img/${p.type}`;
  document.getElementById("detail-img").src = imgSrc;

  // Мета
  document.getElementById("detail-type").textContent = p.type || "—";
  document.getElementById("detail-name").textContent =
    (signTypes.find(t => t.type === p.type) || {}).name || "—";
  document.getElementById("detail-badge").textContent = `код ${p.code || "—"}`;

  // Поля
  document.getElementById("df-time").textContent    = p.time    || "—";
  document.getElementById("df-video").textContent   = p.name_video || "—";
  document.getElementById("df-azimuth").textContent = p.azimuth ? `${Math.round(p.azimuth)}°` : "—";
  document.getElementById("df-side").textContent    = parseSide(p.side);

  // Edit form
  document.getElementById("edit-type").value = p.type || "";
  document.getElementById("edit-desc").value = desc;
  toggleDescField(p.type);
}

function parseSide(raw) {
  if (!raw) return "—";
  return String(raw).includes("True") ? "Левая" : "Правая";
}

function closeDetail() {
  if (selectedId) {
    const el = document.getElementById(`sm-${selectedId}`);
    if (el) el.classList.remove("selected");
    selectedId = null;
  }
  document.getElementById("detail-empty").style.display   = "";
  document.getElementById("detail-content").style.display = "none";
  document.getElementById("btn-close-detail").style.display = "none";
}

// ── Edit ────────────────────────────────────────────────────────────
function onTypeChange() {
  const t = document.getElementById("edit-type").value;
  toggleDescField(t);
}

function toggleDescField(type) {
  // Типы с текстом — упрощённая проверка (содержат цифры и точки в известных диапазонах)
  const withText = ["3.24","3.11","3.12","3.13","3.14","3.25",
                    "8.1.1","8.1.3","8.1.4","8.2.1","8.2.5","8.2.6",
                    "8.2.2","5.22.1","5.22.2","5.23.1","5.23.2","5.23.3","5.25.3"];
  const show = withText.includes(type);
  document.getElementById("edit-desc-row").style.display = show ? "" : "none";
}

async function saveSign() {
  if (!selectedId) return;
  const body = {
    type:        document.getElementById("edit-type").value,
    description: document.getElementById("edit-desc").value,
  };
  const r = await fetch(`${API}/sign/${selectedId}`, {
    method:  "PATCH",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify(body),
  });
  if (r.ok) {
    toast("Сохранено", "ok");
    // Обновить локально и перерисовать маркер
    const idx = signsData.findIndex(s => s.id === selectedId);
    if (idx !== -1) {
      signsData[idx].type        = body.type;
      signsData[idx].description = body.description;
    }
    // Перезагрузить панель
    selectSign(selectedId);
    renderMarkers();
  } else {
    toast("Ошибка сохранения", "err");
  }
}

async function deleteSign() {
  if (!selectedId || !confirm("Удалить знак?")) return;
  const r = await fetch(`${API}/sign/${selectedId}`, { method: "DELETE" });
  if (r.ok) {
    toast("Знак удалён");
    signsData = signsData.filter(s => s.id !== selectedId);
    document.getElementById("stat-signs").textContent = signsData.length;
    closeDetail();
    renderMarkers();
  } else {
    toast("Ошибка удаления", "err");
  }
}

// ── Jump to frame ────────────────────────────────────────────────────
function jumpToFrame() {
  if (!selectedId) return;
  const sign = signsData.find(s => s.id === selectedId);
  if (!sign) return;

  // Парсим absolute_frame_numbers → берём среднее → в секунды (60fps)
  let rawFrames = sign.abs_frame || "";
  rawFrames = rawFrames.replace(/[\[\]]/g, "").split(",").map(Number).filter(Boolean);
  if (!rawFrames.length) { toast("Нет данных о кадре"); return; }

  const avgFrame = rawFrames.reduce((a,b) => a+b, 0) / rawFrames.length;
  const seconds  = Math.round(avgFrame / 60);
  fetch(`${API}/jump?seconds=${seconds}`);
  vcSetTime(seconds);
  toast(`Прыжок к ${fmtTime(seconds)}`);
  document.getElementById("stat-pos-wrap").style.display = "";
  document.getElementById("stat-pos").textContent = fmtTime(seconds);
}

// ── Video controls (локальный таймер — реальный плеер в PyQt) ──────
function vcToggle() {
  vcPlaying = !vcPlaying;
  document.getElementById("vc-play").textContent = vcPlaying ? "⏸" : "▷";
  if (vcPlaying) {
    vcInterval = setInterval(() => {
      vcSeconds++;
      vcSetTime(vcSeconds);
      fetch(`${API}/jump?seconds=${vcSeconds}`);
    }, 1000);
  } else {
    clearInterval(vcInterval);
  }
}

function vcStep(delta) {
  vcSeconds = Math.max(0, vcSeconds + delta);
  vcSetTime(vcSeconds);
  fetch(`${API}/jump?seconds=${vcSeconds}`);
}

function vcSeek(val) {
  const max = parseInt(document.getElementById("video-slider").max);
  vcSeconds = Math.round(val / 100 * max);
  vcSetTime(vcSeconds);
  fetch(`${API}/jump?seconds=${vcSeconds}`);
}

function vcSetTime(s) {
  vcSeconds = s;
  document.getElementById("video-time").textContent = fmtTime(s);
  const max = parseInt(document.getElementById("video-slider").max) || 3600;
  document.getElementById("video-slider").value = Math.round(s / max * 100);
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = String(s % 60).padStart(2, "0");
  return `${m}:${sec}`;
}

// ── Live mode ────────────────────────────────────────────────────────
function toggleLive() {
  liveMode = !liveMode;
  const dot  = document.getElementById("live-dot");
  const mode = document.getElementById("stat-mode");
  const btn  = document.getElementById("btn-live");
  dot.classList.toggle("live", liveMode);
  mode.textContent = liveMode ? "Live" : "Статика";
  btn.style.color  = liveMode ? "var(--success)" : "";
}

// ── Track toggle ────────────────────────────────────────────────────
function toggleTrack() {
  showTrack = !showTrack;
  if (trackLine) {
    showTrack ? map.addLayer(trackLine) : map.removeLayer(trackLine);
  }
}

function fitTrack() {
  if (trackLine) map.fitBounds(trackLine.getBounds(), { padding: [30, 30] });
}

// ── Filter ──────────────────────────────────────────────────────────
function applyFilter() {
  filterText = document.getElementById("filter-input").value;
  renderMarkers();
}

function setChip(el, side) {
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  filterSide = side;
  renderMarkers();
}

// ── Toast ────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.borderColor = type === "ok"
    ? "var(--success)" : type === "err"
    ? "var(--error)" : "var(--border2)";
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

// ── SocketIO ────────────────────────────────────────────────────────
function initSocket() {
  const socket = io(`http://localhost:${PORT}`);

  socket.on("position", seconds => {
    if (!liveMode) return;
    vcSetTime(seconds);
    document.getElementById("stat-pos-wrap").style.display = "";
    document.getElementById("stat-pos").textContent = fmtTime(seconds);
  });

  socket.on("sign_updated", ({ id }) => {
    // Перезагрузить знак из API
    fetch(`${API}/signs`).then(r => r.json()).then(data => {
      signsData = data;
      renderMarkers();
    });
  });

  socket.on("sign_deleted", ({ id }) => {
    signsData = signsData.filter(s => s.id !== id);
    renderMarkers();
    if (selectedId === id) closeDetail();
  });

  socket.on("new_sign", sign => {
    signsData.push(sign);
    document.getElementById("stat-signs").textContent = signsData.length;
    renderMarkers();
    toast(`Новый знак: ${sign.type}`);
  });
}

// ── Boot ────────────────────────────────────────────────────────────
initMap();
initSocket();
loadAll();
</script>
</body>
</html>
